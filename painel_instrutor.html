<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Painel do Instrutor · Quiz Resolume</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root{--org:#ED7D31;--org2:#c8641f;--dark:#16161a;--ink:#26262b;--grey:#6a6a70;--ok:#4f8a3a;--bad:#c0392b;--bg:#f4f5f7;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink)}
.wrap{max-width:680px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
header{background:var(--dark);color:#fff;padding:12px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.hl{display:flex;align-items:center;gap:12px;min-width:0}
.hl>img{height:30px;flex:none}
.hl .txt{min-width:0}.hl .t{font-weight:700;font-size:14px;line-height:1.15}.hl .s{font-size:10.5px;color:#b9b9c0}
.hr{display:flex;align-items:center;gap:10px;flex:none}
.hr .div{width:1px;height:26px;background:#3a3a42}
.hr .cl{text-align:right;line-height:1}
.hr .cl .lbl{font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:#7d7d86}
.hr img.fm{height:14px;margin-top:4px;opacity:.96;display:block;margin-left:auto}
.bar{height:5px;background:linear-gradient(90deg,var(--org),var(--org2))}
main{flex:1;padding:22px 20px 30px}
@media (min-width:760px){ .wrap{max-width:900px} main{padding:30px 24px 40px} }
@media (max-width:430px){ .hl .s{display:none} .hl>img{height:26px} .hr .cl .lbl{display:none} .hr .div{display:none} .hr img.fm{height:13px} }
.overlay{position:fixed;inset:0;background:rgba(12,12,16,.74);display:flex;align-items:center;justify-content:center;padding:16px;z-index:60;animation:fade .2s ease}
.modal{background:#fff;border-radius:18px;max-width:860px;width:100%;max-height:92vh;overflow:auto;padding:22px;box-shadow:0 24px 70px rgba(0,0,0,.4)}
.modal .mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.modal .mh h1{margin:0}
.modal .close{border:0;background:#eee;border-radius:12px;width:40px;height:40px;font-size:20px;cursor:pointer;color:var(--ink)}
.gcols{display:flex;gap:16px;flex-wrap:wrap;margin-top:10px}
.gcol{flex:1;min-width:250px;border:1px solid #eee;border-radius:14px;padding:16px}
.gcol h2{margin:0 0 10px;color:var(--org);font-size:17px}
.card{background:#fff;border-radius:16px;box-shadow:0 6px 24px rgba(0,0,0,.06);padding:24px;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
h1{font-size:22px;margin:.1em 0 .3em}h1 span{color:var(--org)}
p.lead{color:var(--grey);font-size:14px;line-height:1.5}
label{display:block;font-size:13px;font-weight:600;margin:14px 0 6px}
input,select{width:100%;padding:13px 14px;border:1.5px solid #dcdce2;border-radius:11px;font-size:16px;outline:none;background:#fff}
input:focus,select:focus{border-color:var(--org)}
.btn{display:block;width:100%;border:0;border-radius:12px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;margin-top:16px;background:var(--org);color:#fff}
.btn:active{background:var(--org2)}.btn.ghost{background:#eee;color:var(--ink)}.btn.dark{background:var(--dark)}
.prog{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--grey);margin-bottom:10px}
.track{height:7px;background:#ececef;border-radius:99px;overflow:hidden;margin-bottom:18px}
.fill{height:100%;background:var(--org);width:0;transition:width .3s}
.q{font-size:18px;font-weight:600;line-height:1.35;margin:4px 0 16px}
.opt{border:1.5px solid #dcdce2;border-radius:12px;padding:14px 16px;margin:9px 0;font-size:16px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:10px}
.opt:hover{border-color:#c3c3cc}.opt .k{width:26px;height:26px;flex:none;border-radius:50%;background:#eee;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--grey)}
.opt.sel{border-color:var(--org);background:#fff6ee}.opt.sel .k{background:var(--org);color:#fff}
.score{font-size:64px;font-weight:800;color:var(--org);text-align:center;line-height:1}
.score small{display:block;font-size:15px;color:var(--grey);font-weight:600;margin-top:6px}
.stat{background:#faf6f1;border:1px solid #f0e2d2;border-radius:12px;padding:14px 16px;margin-top:16px;font-size:14px;color:#6a5a48;text-align:center}
.foot{padding:14px 20px;text-align:center}.foot a{color:#a9a9b0;font-size:11px;text-decoration:none}
.msg{font-size:13px;color:var(--grey)}
.pill{display:inline-block;background:var(--org);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px;letter-spacing:.03em}
table{width:100%;border-collapse:collapse;margin-top:14px;font-size:14px}
th,td{text-align:left;padding:9px 10px;border-bottom:1px solid #eee}th{color:var(--org);font-size:12px;text-transform:uppercase}
tr:hover td{background:#faf7f3}
.kpi{display:flex;gap:14px;flex-wrap:wrap;margin-top:6px}
.kpibox{flex:1;min-width:120px;background:#fff;border:1px solid #eee;border-radius:12px;padding:14px;text-align:center}
.kpibox b{display:block;font-size:30px;color:var(--org)}.kpibox span{font-size:12px;color:var(--grey)}
.distrow{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:13px}
.distbar{flex:1;height:12px;background:#eee;border-radius:99px;overflow:hidden}.distbar i{display:block;height:100%;background:var(--org)}
 .wrap{max-width:900px}.qcards{display:flex;gap:20px;flex-wrap:wrap;margin-top:20px}
.qc{background:#fff;border-radius:16px;box-shadow:0 6px 20px rgba(0,0,0,.07);padding:22px;text-align:center;width:300px}
.qc h2{margin:0 0 4px;color:var(--org)}.qc p{color:var(--grey);font-size:13px;margin:2px 0 14px}.qc .qr{display:flex;justify-content:center}
.qc img.v{height:24px;margin-top:12px}.qc .nq{font-size:12px;color:var(--grey);margin-top:8px}
@media print{.noprint{display:none}body{background:#fff}.qc{box-shadow:none;border:1px solid #eee}}
</style></head><body><div class="wrap">

<script>
const QUIZ_URL="https://joaovideo.github.io/quiz-resolume/quiz.html";
const BACKEND="https://script.google.com/macros/s/AKfycbzAaTSMZkOIUcxcbELSKVkkbd3hPqjDp-baj-WK-w3qg4DuXAlbMzFwdMnxz4khPiSD1Q/exec";
function jsonp(url,cb){const s=document.createElement('script');const n='__cb'+Math.random().toString(36).slice(2);
 window[n]=d=>{delete window[n];s.remove();cb(d)};s.onerror=()=>{delete window[n];s.remove();cb(null)};
 s.src=url+(url.includes('?')?'&':'?')+'callback='+n;document.body.appendChild(s);}
function qr(){const nq=document.getElementById('nq').value;const c=document.getElementById('cards');c.innerHTML='';
 ['1','2'].forEach(et=>{const d=document.createElement('div');d.className='qc';
  d.innerHTML=`<h2>ETAPA ${et}</h2><p>Módulos ${et==='1'?'01–06':'07–13'}</p><div class="qr" id="q${et}"></div>
   <div class="nq">${nq} perguntas sorteadas</div><img class="v" src="${document.getElementById('logo').src}">`;
  c.appendChild(d);
  const url=QUIZ_URL+'?etapa='+et+'&n='+nq;
  new QRCode(document.getElementById('q'+et),{text:url,width:220,height:220,colorDark:'#16161a',correctLevel:QRCode.CorrectLevel.M});});}
const OV=document.getElementById('overlay');
function closeG(){OV.innerHTML='';}
function bar(label,v,tot){const p=tot?Math.round(v/tot*100):0;return `<div class="distrow"><span style="width:82px">${label}</span><div class="distbar"><i style="width:${p}%"></i></div><span>${v}</span></div>`;}
function etBlock(et,d){if(!d||!d.count)return `<div class="gcol"><h2>Etapa ${et}</h2><p class="lead">Ainda sem respostas.</p></div>`;
 return `<div class="gcol"><h2>Etapa ${et}</h2>
  <div class="kpi"><div class="kpibox"><b>${d.count}</b><span>participações</span></div>
   <div class="kpibox"><b>${d.avg}%</b><span>média</span></div></div>
  <p class="lead" style="margin:12px 0 4px">Distribuição (anônima):</p>
  ${bar('Alto ≥80%',d.dist.alto,d.count)}${bar('Médio 60–79%',d.dist.medio,d.count)}${bar('Baixo <60%',d.dist.baixo,d.count)}</div>`;}
function openModal(inner){OV.innerHTML=`<div class="overlay" onclick="if(event.target===this)closeG()"><div class="modal">
  <div class="mh"><h1>Resultado Global <span style="color:var(--org)">— Farmarcas</span></h1><button class="close" onclick="closeG()">×</button></div>
  ${inner}</div></div>`;}
function global_(){openModal('<p class="lead">Carregando…</p>');
 jsonp(BACKEND+'?action=global',d=>{if(!d){openModal('<p class="lead">Não foi possível carregar os resultados.</p>');return}
   openModal('<div class="gcols">'+etBlock('1',d['1'])+etBlock('2',d['2'])+'</div>');});}
