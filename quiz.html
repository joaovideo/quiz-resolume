<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Quiz · Resolume Arena 7 — Vídeo Engenharia</title><style>
:root{--org:#ED7D31;--org2:#c8641f;--dark:#16161a;--ink:#26262b;--grey:#6a6a70;--ok:#4f8a3a;--bad:#c0392b;--bg:#f4f5f7;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink)}
.wrap{max-width:680px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
header{background:var(--dark);color:#fff;padding:16px 20px;display:flex;align-items:center;gap:12px}
header img{height:34px}header .t{font-weight:700;font-size:15px;line-height:1.1}header .s{font-size:11px;color:#b9b9c0}
.bar{height:5px;background:linear-gradient(90deg,var(--org),var(--org2))}
main{flex:1;padding:22px 20px 30px}
.card{background:#fff;border-radius:16px;box-shadow:0 6px 24px rgba(0,0,0,.06);padding:24px;animation:fade .25s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1}}
h1{font-size:22px;margin:.1em 0 .3em}h1 span{color:var(--org)}
p.lead{color:var(--grey);font-size:14px;line-height:1.5}
label{display:block;font-size:13px;font-weight:600;margin:14px 0 6px}
input,select{width:100%;padding:13px 14px;border:1.5px solid #dcdce2;border-radius:11px;font-size:16px;outline:none}
input:focus{border-color:var(--org)}
.btn{display:block;width:100%;border:0;border-radius:12px;padding:15px;font-size:16px;font-weight:700;cursor:pointer;margin-top:16px;background:var(--org);color:#fff}
.btn:active{background:var(--org2)}.btn.ghost{background:#eee;color:var(--ink)}.btn.dark{background:var(--dark)}
.prog{display:flex;justify-content:space-between;align-items:center;font-size:12px;color:var(--grey);margin-bottom:10px}
.track{height:7px;background:#ececef;border-radius:99px;overflow:hidden;margin-bottom:18px}
.fill{height:100%;background:var(--org);width:0;transition:width .3s}
.q{font-size:18px;font-weight:600;line-height:1.35;margin:4px 0 16px}
.opt{border:1.5px solid #dcdce2;border-radius:12px;padding:14px 16px;margin:9px 0;font-size:16px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:10px}
.opt:hover{border-color:#c3c3cc}.opt .k{width:26px;height:26px;flex:none;border-radius:50%;background:#eee;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--grey)}
.opt.sel{border-color:var(--org);background:#fff6ee}.opt.sel .k{background:var(--org);color:#fff}
.score{font-size:64px;font-weight:800;color:var(--org);text-align:center;line-height:1}
.score small{display:block;font-size:15px;color:var(--grey);font-weight:600;margin-top:6px}
.stat{background:#faf6f1;border:1px solid #f0e2d2;border-radius:12px;padding:14px 16px;margin-top:16px;font-size:14px;color:#6a5a48;text-align:center}
.foot{padding:14px 20px;text-align:center}.foot a{color:#a9a9b0;font-size:11px;text-decoration:none}
.msg{font-size:13px;color:var(--grey)}
.pill{display:inline-block;background:var(--org);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:99px;letter-spacing:.03em}
table{width:100%;border-collapse:collapse;margin-top:14px;font-size:14px}
th,td{text-align:left;padding:9px 10px;border-bottom:1px solid #eee}th{color:var(--org);font-size:12px;text-transform:uppercase}
tr:hover td{background:#faf7f3}
.kpi{display:flex;gap:14px;flex-wrap:wrap;margin-top:6px}
.kpibox{flex:1;min-width:120px;background:#fff;border:1px solid #eee;border-radius:12px;padding:14px;text-align:center}
.kpibox b{display:block;font-size:30px;color:var(--org)}.kpibox span{font-size:12px;color:var(--grey)}
.distrow{display:flex;align-items:center;gap:10px;margin:7px 0;font-size:13px}
.distbar{flex:1;height:12px;background:#eee;border-radius:99px;overflow:hidden}.distbar i{display:block;height:100%;background:var(--org)}
</style></head>

const $=s=>document.querySelector(s); const main=$("#main");
let state={etapa:null,nome:"",turma:"",i:0,order:[],score:0};
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[a[i],a[j]]=[a[j],a[i]]}return a}
function param(k){return new URLSearchParams(location.search).get(k)}
function jsonp(url,cb){const s=document.createElement('script');const n='__cb'+Math.random().toString(36).slice(2);
 window[n]=d=>{delete window[n];s.remove();cb(d)};s.onerror=()=>{delete window[n];s.remove();cb(null)};
 s.src=url+(url.includes('?')?'&':'?')+'callback='+n;document.body.appendChild(s);}
function home(){main.innerHTML=`<div class="card"><span class="pill">AVALIAÇÃO</span>
 <h1>Quiz <span>Resolume Arena 7</span></h1><p class="lead">Escolha a etapa do treinamento.</p>
 <button class="btn" onclick="start('1')">Etapa 1 — Módulos 01 a 06</button>
 <button class="btn ghost" onclick="start('2')">Etapa 2 — Módulos 07 a 13</button></div>`;}
function start(et){state.etapa=et;main.innerHTML=`<div class="card"><span class="pill">ETAPA ${et}</span>
 <h1>Vamos começar!</h1><p class="lead">São <b>${BANK[et].length} perguntas</b>. Ao final, sua nota é enviada automaticamente. Só o instrutor vê a nota individual.</p>
 <label>Seu nome completo *</label><input id="nome" placeholder="Digite seu nome" autocomplete="name">
 <p class="msg" style="margin-top:10px">Turma: <b>${CONFIG.TURMA}</b></p>
 <button class="btn" onclick="begin()">Iniciar quiz</button></div>`;}
function begin(){const nome=$("#nome").value.trim();if(!nome){$("#nome").focus();$("#nome").style.borderColor="var(--bad)";return}
 state.nome=nome;state.turma=CONFIG.TURMA;state.order=shuffle(BANK[state.etapa].map((q,i)=>i));state.i=0;state.score=0;render();}
function render(){const N=BANK[state.etapa].length;const q=BANK[state.etapa][state.order[state.i]];
 const opts=q.opts.map((o,k)=>`<div class="opt" data-k="${k}" onclick="pick(${k})"><span class="k">${'ABCD'[k]}</span><span>${o}</span></div>`).join("");
 main.innerHTML=`<div class="card"><div class="prog"><span>Pergunta ${state.i+1} de ${N}</span><span>Etapa ${state.etapa}</span></div>
 <div class="track"><div class="fill" style="width:${state.i/N*100}%"></div></div><div class="q">${q.q}</div><div>${opts}</div>
 <button class="btn" id="next" style="opacity:.5;pointer-events:none" onclick="next()">${state.i===N-1?'Finalizar':'Próxima'}</button></div>`;
 state.cur=null;}
function pick(k){document.querySelectorAll('.opt').forEach(e=>e.classList.remove('sel'));
 document.querySelector(`.opt[data-k="${k}"]`).classList.add('sel');state.cur=k;const n=$("#next");n.style.opacity=1;n.style.pointerEvents="auto";}
function next(){if(state.cur===null)return;const N=BANK[state.etapa].length;const q=BANK[state.etapa][state.order[state.i]];
 if(state.cur===q.c)state.score++;if(state.i<N-1){state.i++;render()}else finish();}
function finish(){const N=BANK[state.etapa].length;const pct=Math.round(state.score/N*100);
 main.innerHTML=`<div class="card"><span class="pill">ETAPA ${state.etapa} · CONCLUÍDA</span>
 <h1>Muito bem, ${state.nome.split(' ')[0]}!</h1><div class="score">${state.score}/${N}<small>${pct}% de acerto</small></div>
 <div id="stat" class="stat">Enviando resultado…</div></div>`;
 submit(pct,N);}
function submit(pct,N){
 if(!CONFIG.BACKEND_URL){$("#stat").innerHTML="⚠ Backend não configurado (avise o instrutor).";return;}
 const p=new URLSearchParams({action:'save',nome:state.nome,turma:state.turma,etapa:state.etapa,score:state.score,total:N,pct:pct});
 jsonp(CONFIG.BACKEND_URL+'?'+p.toString(),d=>{
   $("#stat").innerHTML=(d&&d.ok)?"✔ Resultado enviado com sucesso! Aguarde o resultado geral com o instrutor."
     :"✔ Concluído. (não foi possível confirmar o envio)";});
}
const et=param("etapa"); if(et==="1"||et==="2")start(et); else home();
</script></body></html>
